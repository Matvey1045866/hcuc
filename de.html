<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор JSON — JSONBin.io</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, monospace;
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(15, 25, 45, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            font-size: 1.6rem;
            margin: 0 0 5px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub {
            text-align: center;
            color: #6c86a3;
            font-size: 0.8rem;
            margin-bottom: 25px;
        }
        .bits {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        .bit {
            text-align: center;
        }
        .bit button {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.1s;
        }
        .bit .btn-0 {
            background: #1a2538;
            color: #8aa3c4;
            box-shadow: 0 5px 0 #0a0f16;
        }
        .bit .btn-1 {
            background: #00b4aa;
            color: white;
            box-shadow: 0 2px 0 #005566;
            transform: translateY(3px);
        }
        .bit span {
            display: block;
            margin-top: 8px;
            font-size: 12px;
            color: #5a7a9a;
        }
        .display {
            background: #0a101c;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            margin: 20px 0;
        }
        .display span {
            font-size: 2rem;
            font-family: monospace;
            letter-spacing: 8px;
            color: #00e0ff;
            background: #07121f;
            padding: 10px 20px;
            border-radius: 15px;
            display: inline-block;
        }
        button {
            background: #2a3f5a;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
        }
        button:active {
            transform: scale(0.96);
        }
        .msg {
            text-align: center;
            padding: 10px;
            font-size: 0.8rem;
            border-radius: 20px;
            margin-top: 15px;
        }
        .success {
            background: #1a3a2a;
            color: #6effb0;
        }
        .error {
            background: #3a1a1a;
            color: #ff8888;
        }
        .info {
            background: #1a2a3a;
            color: #7ac4ff;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        hr {
            border-color: #1e3350;
            margin: 20px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📝 РЕДАКТОР JSON</h1>
    <div class="sub">Изменение data.json на сервере (JSONBin.io)</div>

    <div class="bits" id="bits"></div>

    <div class="display">
        <span id="bitsDisplay">000000</span>
    </div>

    <div class="btn-group">
        <button id="readBtn">📥 ПРОЧИТАТЬ</button>
        <button id="writeBtn">💾 ЗАПИСАТЬ НА СЕРВЕР</button>
        <button id="resetBtn">⟳ СБРОСИТЬ</button>
    </div>

    <hr>

    <div class="info-box" style="background:#0a101c; border-radius:20px; padding:15px; margin-top:10px;">
        <div class="label" style="font-size:0.7rem; color:#7a9cbb;">🔑 ВАШИ ДАННЫЕ:</div>
        <div style="font-family:monospace; font-size:0.7rem; word-break:break-all;">
            📦 Bin ID: <span style="color:#00ffaa;">69c8f0d46860e0745bff6a1c</span><br>
            🔑 API Key: <span style="color:#00ffaa;">$2a$10$zauOj/hIiKO.HSk1UfIS1OoFrrGilBzSb8CQzXnl2w6N7uiLJP1ra</span><br>
            📨 Header: <span style="color:#00d4ff;">X-Access-Key</span>
        </div>
    </div>

    <div id="msg" class="msg info">⚙️ Нажмите "ПРОЧИТАТЬ" для загрузки данных</div>
</div>

<script>
    // ========== ВАШИ ДАННЫЕ ==========
    const BIN_ID = '69c8f0d46860e0745bff6a1c';
    const API_KEY = '$2a$10$zauOj/hIiKO.HSk1UfIS1OoFrrGilBzSb8CQzXnl2w6N7uiLJP1ra';
    
    let bits = [0, 0, 0, 0, 0, 0];
    const bitsContainer = document.getElementById('bits');
    const bitsDisplay = document.getElementById('bitsDisplay');
    const msgDiv = document.getElementById('msg');

    function showMessage(text, type) {
        msgDiv.textContent = text;
        msgDiv.className = `msg ${type}`;
        setTimeout(() => {
            if (msgDiv.className !== 'msg info') {
                // не сбрасываем если через 3 секунды не поменялось
            }
        }, 3000);
    }

    function updateDisplay() {
        const bitString = bits.join('');
        bitsDisplay.textContent = bitString;
        
        // обновляем кнопки
        for (let i = 0; i < 6; i++) {
            const btn = document.getElementById(`bit_btn_${i}`);
            if (btn) {
                if (bits[i] === 1) {
                    btn.className = 'btn-1';
                    btn.textContent = '1';
                } else {
                    btn.className = 'btn-0';
                    btn.textContent = '0';
                }
            }
        }
    }

    function setBit(index, value) {
        bits[index] = value ? 1 : 0;
        updateDisplay();
    }

    function toggleBit(index) {
        bits[index] = bits[index] === 1 ? 0 : 1;
        updateDisplay();
    }

    // ========== ЧТЕНИЕ С СЕРВЕРА ==========
    async function readFromServer() {
        showMessage('⏳ Чтение с сервера...', 'info');
        
        try {
            const url = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;
            const response = await fetch(url, {
                headers: {
                    'X-Access-Key': API_KEY,
                    'Content-Type': 'application/json'
                }
            });
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const data = await response.json();
            const record = data.record;
            
            if (record && record.value && typeof record.value === 'string' && record.value.length === 6) {
                bits = record.value.split('').map(Number);
                updateDisplay();
                showMessage(`✅ Прочитано: ${record.value}`, 'success');
            } else {
                throw new Error('Неверный формат данных');
            }
        } catch (error) {
            showMessage(`❌ Ошибка: ${error.message}`, 'error');
        }
    }

    // ========== ЗАПИСЬ НА СЕРВЕР ==========
    async function writeToServer() {
        const bitString = bits.join('');
        showMessage(`⏳ Запись "${bitString}" на сервер...`, 'info');
        
        try {
            const url = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'X-Access-Key': API_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ value: bitString })
            });
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            showMessage(`✅ Записано: ${bitString}`, 'success');
        } catch (error) {
            showMessage(`❌ Ошибка записи: ${error.message}`, 'error');
        }
    }

    function resetBits() {
        bits = [0, 0, 0, 0, 0, 0];
        updateDisplay();
        showMessage('⟳ Биты сброшены в 000000 (не записано на сервер)', 'info');
    }

    // ========== СОЗДАНИЕ КНОПОК ==========
    function createBitButtons() {
        bitsContainer.innerHTML = '';
        for (let i = 0; i < 6; i++) {
            const div = document.createElement('div');
            div.className = 'bit';
            
            const btn = document.createElement('button');
            btn.id = `bit_btn_${i}`;
            btn.className = 'btn-0';
            btn.textContent = '0';
            btn.addEventListener('click', () => toggleBit(i));
            
            const span = document.createElement('span');
            span.textContent = `BIT ${i}`;
            
            div.appendChild(btn);
            div.appendChild(span);
            bitsContainer.appendChild(div);
        }
    }

    // ========== ПРИВЯЗКА КНОПОК ==========
    document.getElementById('readBtn').addEventListener('click', readFromServer);
    document.getElementById('writeBtn').addEventListener('click', writeToServer);
    document.getElementById('resetBtn').addEventListener('click', resetBits);

    // ========== ЗАПУСК ==========
    createBitButtons();
    updateDisplay();
    
    // Автоматически читаем при загрузке
    setTimeout(() => {
        readFromServer();
    }, 500);
</script>
</body>
</html>
