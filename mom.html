<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Момочке!</title>
        <link rel="stylesheet" href="https://pyscript.net/releases/2024.3.1/core.css">
        <script type="module" src="https://pyscript.net/releases/2024.3.1/core.js"></script>
        <style>
            body {
                text-align: center;
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
                min-height: 100vh;
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .card {
                background: white;
                border-radius: 20px;
                padding: 40px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            }
            h1 {
                color: #e74c3c;
                font-size: 2em;
            }
            #msg {
                font-size: 20px;
                color: #2c3e50;
                min-height: 200px;
                padding: 20px;
                background: #fff5f5;
                border-radius: 10px;
                margin: 20px 0;
                line-height: 1.6;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>🌹 Любимой мамочке! 🌹</h1>
            <div id="msg"></div>
        </div>

        <script type="mpy" src="pyscr.py"></script>
    </body>
</html>
